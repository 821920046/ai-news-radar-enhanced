<!doctype html>
<html lang="zh-CN" class="scroll-smooth overflow-x-hidden w-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Board — 24 小时 AI 资讯雷达</title>
    <link rel="icon" href="./assets/logo-32.webp" type="image/webp" />
    <link rel="apple-touch-icon" href="./assets/logo-180.webp" />
    <link rel="manifest" href="./manifest.json" />

    <!-- SEO & PWA Meta -->
    <meta name="description" content="AI Signal Board - 24 小时 AI/科技/数码/硬件全向情报雷达。实时聚合 12+ 信源，AI 精选推荐。" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Signal Board — 24 小时 AI 资讯雷达" />
    <meta property="og:description" content="实时聚合 12+ 高质量 AI 信源，AI 精选推荐，24 小时全向情报雷达。" />
    <meta property="og:url" content="https://821920046.github.io/ai-news-radar-enhanced/" />
    <meta property="og:image" content="https://821920046.github.io/ai-news-radar-enhanced/assets/logo-180.webp" />
    <meta property="og:locale" content="zh_CN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AI Signal Board — 24 小时 AI 资讯雷达" />
    <meta name="twitter:description" content="实时聚合 12+ 高质量 AI 信源，AI 精选推荐。" />
    <meta name="twitter:image" content="https://821920046.github.io/ai-news-radar-enhanced/assets/logo-180.webp" />

    <!-- 引入 Google fonts (Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (precompiled) -->
    <link rel="stylesheet" href="./assets/tailwind.min.css" />

    <style>
      /* 隐藏默认滚动条，使用极细的美化滚动条 */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(9, 9, 11, 0.5);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(63, 63, 70, 0.4);
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(20, 184, 166, 0.5);
      }

      /* 消除横向溢出滚动条样式 */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* 毛玻璃面板基类 */
      .glass-panel {
        background: rgba(24, 24, 27, 0.45);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(63, 63, 70, 0.3);
      }

      /* 流光输入框焦点效果 */
      .search-glow:focus-within {
        border-color: rgba(20, 184, 166, 0.6);
        box-shadow: 0 0 15px rgba(20, 184, 166, 0.15);
      }

      /* 旋转动画适用于 details 箭头的旋转 */
      details[open] summary .arrow-icon {
        transform: rotate(180deg);
      }

      /* 卡片悬停时的流光左边框过渡 */
      .card-left-border {
        position: relative;
      }
      .card-left-border::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 3px;
        background: transparent;
        transition: background-color 0.3s ease;
      }

      .card-left-border[data-category="AI"]::before { background-color: #3b82f6; }
      .card-left-border[data-category="科技"]::before { background-color: #14b8a6; }
      .card-left-border[data-category="数码"]::before { background-color: #8b5cf6; }
      .card-left-border[data-category="电脑硬件"]::before { background-color: #f97316; }

      /* 骨架屏流光闪烁 */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer-bg {
        background: linear-gradient(90deg, #1e1e24 25%, #2a2a35 50%, #1e1e24 75%);
        background-size: 200% 100%;
        animation: shimmer 1.6s infinite linear;
      }

      /* 雷达扫描动效 */
      @keyframes radar-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .radar-scanner {
        position: absolute;
        inset: -50%;
        background: conic-gradient(from 0deg, transparent 70%, rgba(20, 184, 166, 0.7) 100%);
        animation: radar-spin 4.5s linear infinite;
        pointer-events: none;
      }

      .timeline-news-row {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr);
        gap: 16px;
      }
      .timeline-stamp {
        position: relative;
        min-height: 100%;
        padding-top: 14px;
        text-align: right;
      }
      .timeline-stamp::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: -20px;
        right: 7px;
        width: 1px;
        background: linear-gradient(180deg, rgba(45, 212, 191, 0.45), rgba(63, 63, 70, 0.35));
      }
      .timeline-dot {
        position: absolute;
        top: 19px;
        right: 2px;
        width: 11px;
        height: 11px;
        border-radius: 9999px;
        background: #14b8a6;
        box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.12), 0 0 16px rgba(20, 184, 166, 0.55);
      }
      @media (max-width: 640px) {
        .timeline-news-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .timeline-stamp {
          min-height: auto;
          padding: 0 0 0 14px;
          text-align: left;
        }
        .timeline-stamp::before {
          left: 4px;
          right: auto;
          top: 4px;
          bottom: -12px;
        }
        .timeline-dot {
          left: 0;
          right: auto;
          top: 5px;
        }
      }
    </style>
  </head>
  <body class="bg-[#09090b] text-zinc-100 min-h-screen font-sans selection:bg-teal-500/30 selection:text-teal-200 antialiased relative overflow-x-hidden w-full">
    
    <!-- 极光背景装饰球（防止移动端溢出撑开屏幕） -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="absolute top-[-100px] left-[-100px] w-[500px] h-[500px] rounded-full bg-teal-500/10 blur-[120px]"></div>
      <div class="absolute top-[20%] right-[-150px] w-[600px] h-[600px] rounded-full bg-purple-600/10 blur-[130px]"></div>
      <div class="absolute bottom-[10%] left-[-150px] w-[500px] h-[500px] rounded-full bg-blue-600/5 blur-[120px]"></div>
    </div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">

      <!-- ==================== HERO HEADER ==================== -->
      <header class="glass-panel rounded-2xl p-6 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-xl shadow-black/30">
        <div class="flex items-center gap-4">
          <div class="relative group cursor-pointer">
            <!-- 带有 overflow-hidden 的图标和扫描层容器 -->
            <div class="relative w-14 h-14 rounded-xl overflow-hidden ring-2 ring-teal-500/20 bg-zinc-900 group-hover:ring-teal-400/50 transition-all duration-300">
              <img class="relative z-10 w-full h-full object-cover scale-[1.15]" src="./assets/logo.webp" alt="Logo" onerror="this.src='./assets/log.png'" />
              <!-- 雷达扫描光线 -->
              <div class="radar-scanner z-20"></div>
            </div>
            <!-- 指示灯必须放在外层，以免被 overflow-hidden 裁切 -->
            <span class="absolute -bottom-1 -right-1 flex h-3 w-3 z-30">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-teal-500"></span>
            </span>
          </div>
          <div>
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-teal-300 via-emerald-400 to-blue-400 bg-clip-text text-transparent">
              AI Signal Board
            </h1>
            <p class="text-xs text-zinc-400 font-medium mt-1">24 小时 AI / 科技 / 数码 / 硬件 全向情报雷达</p>
          </div>
        </div>
        <div class="flex items-center gap-3 bg-zinc-950/40 border border-zinc-800/80 px-4 py-2.5 rounded-xl self-stretch md:self-auto justify-between">
          <div class="text-left md:text-right">
            <span class="block text-[10px] font-bold text-zinc-500 tracking-wider uppercase">Last Updated</span>
            <span class="text-sm font-semibold text-teal-400 font-mono mt-0.5 block" id="updatedAt">加载中...</span>
          </div>
        </div>
      </header>

      <!-- ==================== STATS GRID ==================== -->
      <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="statsGrid">
        <!-- 动态生成数据统计卡片 -->
      </section>

      <!-- ==================== CATEGORY NAV ==================== -->
      <nav class="sticky top-0 z-40 bg-[#09090b]/80 backdrop-blur-md py-3 border-b border-zinc-900/60 mb-6 overflow-x-auto no-scrollbar flex gap-2" id="catNav">
        <!-- 动态生成分类按钮 -->
      </nav>

      <!-- ==================== CONTROLS DECK ==================== -->
      <div class="glass-panel p-4 rounded-2xl mb-6 shadow-lg shadow-black/20 flex flex-col gap-4">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <!-- 搜索框 -->
          <div class="relative flex-1 min-w-[280px] search-glow transition-all duration-300 border border-zinc-800 rounded-xl bg-zinc-950/40">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <svg class="h-4 w-4 text-zinc-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd"/>
              </svg>
            </div>
            <input id="searchInput" type="search" placeholder="在海量信号中检索关键字或来源..." autocomplete="off" 
                   class="block w-full pl-10 pr-4 py-2.5 bg-transparent border-0 text-sm text-zinc-100 placeholder-zinc-500 focus:ring-0 focus:outline-none" />
          </div>

          <!-- 模式切换与排序组合 -->
          <div class="flex flex-wrap items-center gap-3">
            <div class="bg-zinc-950/60 border border-zinc-800/80 p-1 rounded-xl flex gap-1">
              <button id="modeAiBtn" class="px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all duration-200" type="button">AI 强相关</button>
              <button id="modeAllBtn" class="px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all duration-200" type="button">全量情报</button>
            </div>
            
            <div class="bg-zinc-950/60 border border-zinc-800/80 p-1 rounded-xl flex gap-1">
              <button id="sortTimeBtn" class="px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all duration-200" type="button">时间序</button>
              <button id="sortHotBtn" class="px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all duration-200" type="button">热度榜</button>
            </div>

            <!-- 去重切换已被移去 -->
          </div>
        </div>

        <div class="flex items-center gap-2 text-xs font-medium text-zinc-500 border-t border-zinc-900/80 pt-3">
          <span class="inline-block w-1.5 h-1.5 rounded-full bg-teal-500 animate-pulse"></span>
          <span>当前模式：</span>
          <span class="text-zinc-300 font-semibold" id="modeHint">加载中...</span>
        </div>
      </div>

      <!-- ==================== NEWS LIST CONTAINER ==================== -->
      <section class="glass-panel rounded-2xl shadow-xl shadow-black/30 overflow-hidden border border-zinc-850">
        <div class="flex justify-between items-center px-6 py-4.5 border-b border-zinc-900/80 bg-zinc-900/20">
          <h2 class="text-sm font-bold tracking-wider uppercase text-zinc-400" id="listTitle">AI 信号流</h2>
          <span class="text-xs font-bold font-mono px-2.5 py-1 bg-zinc-950/80 border border-zinc-800 rounded-lg text-teal-400 shadow-inner" id="resultCount">0 条</span>
        </div>
        <div id="newsList" class="flex flex-col gap-4 p-3 sm:p-4">
          <!-- 动态加载新闻内容 -->
        </div>
      </section>

      <!-- ==================== WAYTOAGI UPDATES ==================== -->
      <details class="glass-panel rounded-2xl shadow-xl shadow-black/20 overflow-hidden mt-6 border border-zinc-850 group/details">
        <summary class="flex justify-between items-center px-6 py-4 cursor-pointer hover:bg-zinc-900/20 list-none select-none">
          <div class="flex items-center gap-3">
            <svg class="h-4.5 w-4.5 text-teal-400 transition-transform duration-300 arrow-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
            <span class="text-sm font-bold text-zinc-300">WaytoAGI 更新日志</span>
          </div>
          <span class="text-xs text-zinc-500 font-semibold group-hover/details:text-zinc-300 transition-colors">点击展开详情</span>
        </summary>
        
        <div class="border-t border-zinc-900 bg-zinc-950/20">
          <div class="flex flex-wrap justify-between items-center gap-4 px-6 py-3.5 bg-zinc-900/10 border-b border-zinc-900">
            <h2 class="text-xs font-bold text-zinc-400 tracking-wide uppercase">WaytoAGI 最近情报</h2>
            <div class="flex items-center gap-4">
              <div class="bg-zinc-950/60 border border-zinc-900 p-0.5 rounded-lg flex gap-0.5">
                <button id="waytoagiTodayBtn" class="px-3 py-1 rounded-md text-[11px] font-bold transition-all duration-150" type="button">最近更新日</button>
                <button id="waytoagi7dBtn" class="px-3 py-1 rounded-md text-[11px] font-bold transition-all duration-150" type="button">近7日</button>
              </div>
              <span id="waytoagiUpdatedAt" class="text-[10px] font-semibold text-zinc-500 font-mono">加载中...</span>
            </div>
          </div>
          <div id="waytoagiMeta" class="flex flex-wrap items-center gap-2 px-6 py-2.5 text-xs text-zinc-400 bg-zinc-950/40 border-b border-zinc-900/60">
            <!-- 动态生成元信息链接 -->
          </div>
          <div id="waytoagiList" class="p-5 flex flex-col gap-2 max-h-[400px] overflow-y-auto">
            <!-- 动态填充列表 -->
          </div>
        </div>
      </details>

      <!-- ==================== ADVANCED PANEL & HEALTH ==================== -->
      <details class="glass-panel rounded-2xl shadow-xl shadow-black/20 overflow-hidden mt-6 mb-12 border border-zinc-850 group/details">
        <summary class="flex justify-between items-center px-6 py-4 cursor-pointer hover:bg-zinc-900/20 list-none select-none">
          <div class="flex items-center gap-3">
            <svg class="h-4.5 w-4.5 text-teal-400 transition-transform duration-300 arrow-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
            <span class="text-sm font-bold text-zinc-300">高级筛选与源状态监控</span>
          </div>
          <span class="text-xs text-teal-400/80 font-mono font-bold" id="advancedSummary">加载中...</span>
        </summary>
        
        <div class="border-t border-zinc-900 bg-zinc-950/20 p-5 flex flex-col gap-5">
          <div class="flex flex-col gap-2">
            <span class="text-xs font-bold text-zinc-400 uppercase tracking-wider">按源站点精确检索</span>
            <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
              <select id="siteSelect" class="bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2 text-sm text-zinc-100 outline-none focus:border-teal-500 transition-colors min-w-[200px]">
                <option value="">全部站点</option>
              </select>
              <div class="text-[10px] text-zinc-500 font-semibold">或者直接点击下方徽章快速过滤：</div>
            </div>
            <!-- 快速筛选的 Pills 列表 -->
            <div class="flex gap-2 overflow-x-auto py-1 no-scrollbar flex-nowrap" id="sitePills"></div>
          </div>

          <div class="border-t border-zinc-900/80 pt-4">
            <span class="text-xs font-bold text-zinc-400 uppercase tracking-wider block mb-3">系统采集源健康状况</span>
            <div id="sourceHealth">
              <!-- 源状态监控信息 -->
            </div>
          </div>
        </div>
      </details>

    </main>

    <!-- ==================== BACK TO TOP ==================== -->
    <button id="backToTop" class="back-to-top fixed bottom-6 right-6 w-11 h-11 rounded-full bg-gradient-to-r from-teal-500 to-blue-600 text-white font-bold shadow-lg shadow-teal-500/20 flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95 z-50 opacity-0 pointer-events-none translate-y-4" aria-label="回到顶部">
      <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18" />
      </svg>
    </button>

    <!-- ==================== ITEM TEMPLATE ==================== -->
    <template id="itemTpl">
      <article class="news-card timeline-news-row group">
        <div class="timeline-stamp">
          <time class="timeline-time block pr-6 text-lg font-extrabold text-zinc-100 font-mono tracking-tight"></time>
          <span class="timeline-dot"></span>
        </div>
        <div class="card-shell relative rounded-2xl border border-zinc-800/80 bg-zinc-900/45 shadow-lg shadow-black/20 overflow-hidden transition-all duration-300 group-hover:border-teal-500/30 group-hover:bg-zinc-900/65">
          <div class="p-3 sm:p-4">
            <div class="flex flex-col gap-1.5">
              <div class="min-w-0 flex-1">
                <div class="card-meta flex flex-wrap items-center gap-2 text-xs text-zinc-500 mb-2 pr-24">
                  <span class="card-site font-bold text-zinc-500 transition-colors"></span>
                  <span class="card-source px-2 py-0.5 rounded-full text-[10px] bg-zinc-800/70 border border-zinc-700/70 text-zinc-400 font-medium"></span>
                  <span class="card-cat-badge px-2 py-0.5 rounded-full text-[10px] font-bold tracking-wide uppercase"></span>
                </div>
                <a class="card-title text-sm sm:text-base font-semibold text-zinc-100 leading-tight break-words group-hover:text-teal-200 transition-colors block mb-1.5" target="_blank" rel="noopener noreferrer"></a>
                <p class="card-summary text-xs sm:text-sm text-zinc-400 line-clamp-2 leading-relaxed mb-2.5 mt-1 break-words"></p>
                <div class="card-tags flex flex-wrap gap-1.5 mb-2.5"></div>
                <div class="card-discussion text-xs text-zinc-500 font-medium"></div>
              </div>
              <div class="card-score absolute top-3.5 right-4 md:right-5 flex items-center gap-2">
                <span class="px-2 py-0.5 rounded-full border border-amber-400/30 bg-amber-400/10 text-[10px] font-extrabold text-amber-300">精选</span>
                <span class="px-2 py-0.5 rounded-full border border-cyan-400/30 bg-cyan-400/10 text-[10px] font-extrabold text-cyan-300 font-mono"></span>
              </div>
            </div>
          </div>
          <div class="card-reason mx-3 sm:mx-4 mb-2.5 px-3 py-2 rounded-xl border border-teal-500/10 bg-teal-500/10 text-xs sm:text-sm text-teal-300 font-semibold leading-relaxed"></div>
        </div>
      </article>
    </template>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
