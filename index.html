<!doctype html>
<html lang="zh-CN" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Board</title>
    <link rel="icon" href="./assets/log.png" type="image/png" />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            colors: {
              accent: '#0066cc',
              'accent-warm': '#ff3b30',
              good: '#34c759',
              warn: '#ff9500',
              bad: '#ff3b30'
            }
          }
        }
      }
    </script>
    
    <style type="text/tailwindcss">
      @layer base {
        body { @apply bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300; }
        ::-webkit-scrollbar { @apply w-2 h-2; }
        ::-webkit-scrollbar-track { @apply bg-transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-300/50 dark:bg-slate-600/50 rounded-full hover:bg-slate-400/50 dark:hover:bg-slate-500/50; }
      }
      @layer components {
        .shell { @apply max-w-[1024px] mx-auto px-4 sm:px-6 py-8 sm:py-12; }
        .hero { @apply grid grid-cols-1 md:grid-cols-[1fr_auto] gap-6 pb-8 border-b border-slate-200/70 dark:border-slate-800/70; }
        .hero-logo { @apply w-16 h-16 bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-200/70 dark:border-slate-700/70 p-2 object-contain; }
        .hero-headline { @apply flex gap-4 items-center; }
        .hero-tag { @apply m-0 text-xs font-semibold tracking-widest text-slate-400 dark:text-slate-500 uppercase; }
        .hero h1 { @apply mt-1.5 text-3xl sm:text-4xl font-bold tracking-tight text-slate-900 dark:text-white; }
        .hero-sub { @apply mt-4 text-slate-500 dark:text-slate-400 text-base leading-relaxed max-w-2xl; }
        
        .hero-meta { @apply flex flex-col justify-center gap-1.5 min-w-[160px] p-5 bg-white/70 dark:bg-slate-800/70 backdrop-blur-xl border border-slate-200/50 dark:border-slate-700/50 rounded-3xl shadow-sm hover:shadow-md transition-shadow duration-300; }
        .updated-label { @apply text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest; }
        .updated { @apply text-sm font-bold text-slate-900 dark:text-slate-100; }
        
        .stats { @apply grid grid-cols-2 md:grid-cols-4 gap-4 col-span-full mt-4; }
        .stat { @apply flex flex-col p-5 bg-white/70 dark:bg-slate-800/70 backdrop-blur-xl border border-slate-200/50 dark:border-slate-700/50 rounded-3xl shadow-sm hover:shadow-md transition-shadow duration-300; }
        .stat .k { @apply text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-widest; }
        .stat .v { @apply mt-2 text-2xl md:text-3xl font-bold text-slate-900 dark:text-white tracking-tight; }
        
        .coverage-strip { @apply grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-[1px] col-span-full mt-6 bg-slate-200/60 dark:bg-slate-700/60 border border-slate-200/70 dark:border-slate-700/70 rounded-3xl shadow-sm overflow-hidden; }
        .coverage-card { @apply relative flex flex-col p-5 bg-white/70 dark:bg-slate-800/70 backdrop-blur-xl hover:bg-white/95 dark:hover:bg-slate-800/95 transition-all duration-300; }
        .coverage-card::before { content: ''; @apply absolute top-0 left-0 w-1 h-full bg-transparent transition-colors duration-300; }
        .coverage-card.ok:hover::before { @apply bg-good; }
        .coverage-card.warn:hover::before { @apply bg-warn; }
        .coverage-card.signal:hover::before { @apply bg-accent; }
        .coverage-card.official:hover::before { @apply bg-good; }
        .coverage-card.builders:hover::before { @apply bg-accent-warm; }
        .coverage-card.private:hover::before { @apply bg-amber-500; }
        .coverage-card strong { @apply text-[18px] font-bold text-slate-900 dark:text-white leading-tight mt-1.5; }
        .coverage-label { @apply text-[12px] font-semibold text-slate-500 dark:text-slate-400 leading-snug; }
        .coverage-meta { @apply text-[11px] font-medium text-slate-400 dark:text-slate-500 mt-1.5 leading-snug; }
        .coverage-card.ok strong { @apply text-good; }
        .coverage-card.warn strong { @apply text-warn; }
        
        .primary-controls { @apply grid grid-cols-1 md:grid-cols-[1fr_auto] gap-4 items-center mt-8; }
        input, select { @apply w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-slate-200/80 dark:border-slate-700/80 text-slate-900 dark:text-white rounded-2xl px-5 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all shadow-sm; }
        .mode-hint { @apply text-sm font-medium text-slate-500 dark:text-slate-400 whitespace-nowrap px-1; }
        
        .advanced-panel { @apply mt-4 bg-white/60 dark:bg-slate-800/60 backdrop-blur-xl border border-slate-200/50 dark:border-slate-700/50 rounded-3xl shadow-sm overflow-hidden transition-all duration-300; }
        .advanced-panel summary { @apply flex justify-between items-center py-4 px-5 md:px-6 text-sm font-semibold text-slate-900 dark:text-white cursor-pointer select-none list-none relative transition-colors hover:bg-slate-50 dark:hover:bg-slate-700/50; }
        .advanced-panel summary::-webkit-details-marker { @apply hidden; }
        .advanced-panel summary::before { content: "+"; @apply absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 flex items-center justify-center rounded-full border border-slate-300 dark:border-slate-600 text-slate-500 font-bold text-xs; }
        .advanced-panel[open] summary::before { content: "-"; }
        .advanced-panel summary span:first-child { @apply pl-8; }
        .advanced-summary { @apply text-xs font-medium text-slate-500 dark:text-slate-400 whitespace-nowrap; }
        .advanced-content { @apply grid gap-5 px-5 pb-5 md:px-6 md:pb-6 border-t border-slate-200/50 dark:border-slate-700/50 pt-5; }
        .advanced-controls { @apply grid grid-cols-1 md:grid-cols-[minmax(180px,0.8fr)_auto_auto] gap-4 items-end; }
        .field { @apply flex flex-col gap-2 text-xs font-medium text-slate-500 dark:text-slate-400; }
        
        .mode-switch { @apply inline-flex bg-slate-100 dark:bg-slate-900 p-1 rounded-xl shadow-inner; }
        .mode-btn { @apply px-5 py-2.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 transition-all duration-200; }
        .mode-btn.active { @apply bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-sm; }
        
        .all-dedupe { @apply hidden items-center gap-2.5 px-4 py-2.5 bg-slate-100 dark:bg-slate-900 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-400 cursor-pointer select-none transition-all; }
        .all-dedupe.show { @apply inline-flex; }
        .all-dedupe-dot { @apply w-4 h-4 rounded-full border-2 border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 transition-colors flex items-center justify-center; }
        .all-dedupe input:checked + .all-dedupe-dot { @apply border-accent bg-accent; }
        
        .health-grid { @apply grid grid-cols-2 md:grid-cols-4 gap-3; }
        .health-metric { @apply flex flex-col gap-1 p-4 bg-white/50 dark:bg-slate-800/50 backdrop-blur-md rounded-2xl border border-slate-200/50 dark:border-slate-700/50 shadow-sm; }
        .health-metric strong { @apply text-xl font-bold text-slate-900 dark:text-white; }
        .health-label { @apply text-xs font-medium text-slate-500 dark:text-slate-400; }
        .health-metric.ok strong { @apply text-good; }
        .health-metric.warn strong { @apply text-warn; }
        .health-metric.bad strong { @apply text-bad; }
        
        .health-empty, .health-ok { @apply px-4 py-3 rounded-2xl text-sm font-medium border border-dashed border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400; }
        .health-ok { @apply border-solid border-good/30 bg-good/10 text-good; }
        
        .site-pills { @apply flex flex-wrap gap-2.5 pt-2; }
        .pill { @apply px-4 py-2 rounded-full text-[13px] font-medium bg-white/80 dark:bg-slate-800/80 border border-slate-200/80 dark:border-slate-700/80 text-slate-600 dark:text-slate-300 shadow-sm transition-all duration-300 hover:shadow-md hover:-translate-y-0.5; }
        .pill.active { @apply bg-accent border-accent text-white dark:bg-accent dark:border-accent dark:text-white shadow-md hover:bg-blue-600; }
        
        .list-wrap, .waytoagi-wrap { @apply mt-8 bg-white/60 dark:bg-slate-800/60 backdrop-blur-xl border border-slate-200/50 dark:border-slate-700/50 rounded-[2rem] shadow-sm overflow-hidden; }
        .list-head, .waytoagi-head { @apply flex justify-between items-center px-6 sm:px-8 py-5 border-b border-slate-200/50 dark:border-slate-700/50 bg-white/40 dark:bg-slate-800/40; }
        .list-head h2, .waytoagi-head h2 { @apply text-xl sm:text-2xl font-bold tracking-tight text-slate-900 dark:text-white; }
        
        #resultCount, #waytoagiUpdatedAt { @apply text-sm font-medium text-slate-500 dark:text-slate-400; }
        
        .site-group-head, .source-group-head { @apply flex justify-between items-center px-6 sm:px-8 py-4 border-b border-slate-100 dark:border-slate-800/60 bg-slate-50/50 dark:bg-slate-800/30; }
        .site-group-head h3 { @apply text-base font-bold text-slate-800 dark:text-slate-200; }
        .source-group-head h3 { @apply text-sm font-semibold text-slate-600 dark:text-slate-300; }
        .site-group-head span, .source-group-head span { @apply text-xs font-medium text-slate-500 dark:text-slate-400; }
        
        .news-card { @apply flex flex-col p-5 sm:px-8 sm:py-6 border-b border-slate-100 dark:border-slate-800/60 hover:bg-white/80 dark:hover:bg-slate-700/40 transition-colors duration-200; }
        .news-card:last-child { @apply border-b-0; }
        .meta-row { @apply flex flex-wrap items-center gap-2 text-xs font-medium text-slate-500 dark:text-slate-400 mb-2.5; }
        .site { @apply font-bold text-slate-700 dark:text-slate-300; }
        .category, .source { @apply px-2.5 py-1 rounded-full border border-slate-200/80 dark:border-slate-700/80 bg-white/50 dark:bg-slate-800/50 text-[10px] tracking-wider uppercase; }
        .time { @apply ml-auto font-semibold; }
        
        .category.kind-official { @apply border-good/40 text-good bg-good/5; }
        .category.kind-newsletter { @apply border-warn/40 text-warn bg-warn/5; }
        .category.kind-builders { @apply border-accent-warm/40 text-accent-warm bg-accent-warm/5; }
        
        .title { @apply text-[17px] font-semibold text-slate-900 dark:text-slate-100 leading-snug hover:text-accent dark:hover:text-blue-400 transition-colors; }
        .title-sub { @apply text-[13.5px] font-medium text-slate-500 dark:text-slate-400 mt-1.5 block; }
        
        .empty { @apply p-10 text-center font-medium text-slate-500 dark:text-slate-400 text-sm; }
        
        .waytoagi-tools { @apply flex items-center gap-4; }
        .waytoagi-switch { @apply inline-flex bg-slate-100 dark:bg-slate-900 p-1 rounded-xl; }
        .waytoagi-btn { @apply px-4 py-2 rounded-lg text-xs font-bold text-slate-600 dark:text-slate-400 transition-all; }
        .waytoagi-btn.active { @apply bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-sm; }
        
        .waytoagi-meta { @apply flex flex-wrap items-center gap-2.5 px-6 sm:px-8 pt-5 text-xs font-semibold text-slate-500 dark:text-slate-400; }
        .waytoagi-meta a { @apply text-accent hover:text-blue-600 dark:hover:text-blue-400 transition-colors; }
        
        .waytoagi-list { @apply flex flex-col gap-3 p-6 sm:px-8 sm:pb-8; }
        .waytoagi-item { @apply flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 p-4 bg-white/70 dark:bg-slate-800/70 border border-slate-200/50 dark:border-slate-700/50 rounded-2xl hover:shadow-md hover:-translate-y-0.5 transition-all duration-300; }
        .waytoagi-item .d { @apply text-xs font-bold text-slate-500 dark:text-slate-400 sm:min-w-[72px]; }
        .waytoagi-item .t { @apply text-[14px] font-semibold text-slate-800 dark:text-slate-200 leading-relaxed; }
        
        .health-issues { @apply grid gap-3 mt-4; }
        .health-issue { @apply p-4 border border-red-200/60 dark:border-red-900/60 bg-red-50/50 dark:bg-red-900/20 rounded-2xl; }
        .health-issue-title { @apply text-xs font-bold text-red-600 dark:text-red-400 mb-2; }
        .health-issue ul { @apply pl-5 text-xs font-medium text-slate-600 dark:text-slate-400 list-disc flex flex-col gap-1.5; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-main">
          <div class="hero-headline">
            <img class="hero-logo rounded-2xl" src="./assets/log.png" alt="AI Signal Board Logo" />
            <div>
              <p class="hero-tag">AI NEWS INTELLIGENCE</p>
              <h1>24 小时 AI 更新雷达</h1>
            </div>
          </div>
          <p class="hero-sub">
            高信号 AI/科技更新，附 WaytoAGI 近 7 日变化。
          </p>
        </div>
        <div class="hero-meta">
          <span class="updated-label">更新时间</span>
          <span class="updated" id="updatedAt">加载中...</span>
        </div>

        <section class="stats" id="stats"></section>

        <section class="coverage-strip" id="coverageStrip" aria-label="Source coverage status"></section>
      </header>

      <section class="primary-controls">
        <input id="searchInput" type="search" placeholder="搜索 AI 信号 / 来源" />
        <div class="mode-hint" id="modeHint">AI强相关</div>
      </section>

      <details class="advanced-panel">
        <summary>
          <span>高级筛选与源状态</span>
          <span class="advanced-summary" id="advancedSummary">加载中...</span>
        </summary>
        <div class="advanced-content">
          <div class="advanced-controls">
            <label class="field">
              <span>站点</span>
              <select id="siteSelect">
                <option value="">全部站点</option>
              </select>
            </label>
            <div class="field">
              <span>视图</span>
              <div class="mode-switch">
                <button id="modeAiBtn" class="mode-btn active" type="button">AI强相关</button>
                <button id="modeAllBtn" class="mode-btn" type="button">全量</button>
              </div>
            </div>
            <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
              <input id="allDedupeToggle" type="checkbox" checked />
              <span class="all-dedupe-dot"></span>
              <span id="allDedupeLabel">去重开</span>
            </label>
          </div>
          <div class="source-health" id="sourceHealth">源状态加载中...</div>
          <section class="site-pills" id="sitePills"></section>
        </div>
      </details>

      <section class="waytoagi-wrap">
        <div class="waytoagi-head">
          <h2>WaytoAGI 更新日志</h2>
          <div class="waytoagi-tools">
            <div class="waytoagi-switch">
              <button id="waytoagiTodayBtn" class="waytoagi-btn active" type="button">最近更新日</button>
              <button id="waytoagi7dBtn" class="waytoagi-btn" type="button">近7日</button>
            </div>
            <span id="waytoagiUpdatedAt">加载中...</span>
          </div>
        </div>
        <div id="waytoagiMeta" class="waytoagi-meta"></div>
        <div id="waytoagiList" class="waytoagi-list"></div>
      </section>

      <section class="list-wrap">
        <div class="list-head">
          <h2 id="listTitle">AI 信号流</h2>
          <span id="resultCount">0 条</span>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>
    </main>

    <template id="itemTpl">
      <article class="news-card">
        <div class="meta-row">
          <span class="site"></span>
          <span class="category"></span>
          <span class="source"></span>
          <time class="time"></time>
        </div>
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
      </article>
    </template>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
