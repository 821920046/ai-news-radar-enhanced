<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Dashboard | 科技感情报中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              accent: '#00f2ff',
              cyan: { 400: '#22d3ee', 500: '#06b6d4' },
              purple: { 400: '#c084fc', 600: '#9333ea' }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --accent-cyan: #00f2ff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: #e2e8f0;
            overflow-x: hidden;
            background: radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-cyan), transparent);
            opacity: 0.05;
            position: fixed;
            animation: scan 10s linear infinite;
            z-index: 50;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .data-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 242, 255, 0.2);
            transition: all 0.3s ease;
        }

        .mono-font { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="scanline"></div>

    <!-- HUD 头部 -->
    <header class="sticky top-0 z-40 border-b border-white/5 bg-black/40 backdrop-blur-md px-6 py-4">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white uppercase italic">AI NEWS <span class="text-cyan-400">RADAR</span></h1>
                    <div class="flex items-center gap-2 text-[10px] mono-font text-white/40 uppercase tracking-[0.2em]">
                        <span class="status-dot-pulse w-1.5 h-1.5 bg-cyan-400 rounded-full"></span>
                        LIVE SIGNAL ACQUISITION IN PROGRESS
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-8">
                <div class="text-right hidden md:block">
                    <div class="text-[10px] text-white/30 uppercase tracking-widest mb-1">Update Status</div>
                    <div id="last-update-time" class="text-sm font-medium mono-font text-cyan-400 italic">STANDBY</div>
                </div>
                <button id="toggle-all-mode" class="glass-panel px-4 py-2 rounded-lg text-xs font-semibold hover:bg-white/10 transition-all border-white/10">
                    VERBOSE MODE
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 mt-4">
        
        <!-- 左翼：源健康度监控 -->
        <aside class="lg:col-span-3 space-y-6">
            <div class="glass-panel rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-2 text-[40px] opacity-5 font-black italic uppercase">Signals</div>
                <h3 class="text-sm font-bold text-white/60 mb-6 flex items-center gap-2 tracking-widest uppercase">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    Network Nodes
                </h3>
                <div id="source-coverage-list" class="space-y-4 max-h-[700px] overflow-y-auto pr-2 custom-scroll">
                    <div class="animate-pulse flex flex-col gap-3">
                        <div class="h-12 bg-white/5 rounded-xl"></div>
                        <div class="h-12 bg-white/5 rounded-xl"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 中核：情报流 -->
        <section class="lg:col-span-6 space-y-4 min-h-[800px]">
            <div id="news-container" class="space-y-4">
                <div class="glass-panel rounded-2xl p-20 text-center">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-cyan-400 mb-4"></div>
                    <div class="text-white/20 uppercase tracking-[0.3em] text-xs">Decrypting Signal Stream...</div>
                </div>
            </div>
        </section>

        <!-- 右翼：指标与里程碑 -->
        <aside class="lg:col-span-3 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel rounded-2xl p-5 text-center group">
                    <div id="stat-total-count" class="text-3xl font-bold text-cyan-400 mono-font">000</div>
                    <div class="text-[10px] text-white/40 uppercase tracking-tighter mt-1 font-semibold tracking-widest">24H Captured</div>
                </div>
                <div id="stat-source-count-box" class="glass-panel rounded-2xl p-5 text-center group">
                    <div id="stat-source-count" class="text-3xl font-bold text-purple-400 mono-font">00</div>
                    <div class="text-[10px] text-white/40 uppercase tracking-tighter mt-1 font-semibold tracking-widest">Active Sources</div>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -top-4 -right-4 w-24 h-24 bg-cyan-500/10 blur-3xl rounded-full"></div>
                <h3 class="text-sm font-bold text-white/60 mb-6 flex items-center gap-2 tracking-widest uppercase">
                    <svg class="w-4 h-4 text-cyan-400" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1a1 1 0 112 0v1a1 1 0 11-2 0zM13.464 15.657a1 1 0 010-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1z"/></svg>
                    Milestone Logs
                </h3>
                <div id="waytoagi-list" class="space-y-4">
                    <div class="animate-pulse h-40 bg-white/5 rounded-xl"></div>
                </div>
            </div>
            
            <footer class="px-6 text-[10px] text-white/20 mono-font leading-relaxed uppercase tracking-widest">
                AI NEWS RADAR v2.1-ENHANCED<br>
                DECENTRALIZED SIGNAL AGGREGATION<br>
                © 2026 INTELLIGENCE COMMAND
            </footer>
        </aside>
    </main>

    <!-- 底部信号条 (Mobile) -->
    <div class="fixed bottom-0 left-0 w-full glass-panel border-t border-white/10 p-3 flex justify-around md:hidden z-50">
        <span class="text-cyan-400 text-[10px] font-bold tracking-widest uppercase">Signal: Online</span>
        <span id="stat-mobile" class="text-white/40 text-[10px] font-bold tracking-widest uppercase mono-font">SCANNING...</span>
    </div>

    <!-- 这里的脚本引用必须准确 -->
    <script src="assets/app.js"></script>
</body>
</html>
