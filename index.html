<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Radar | 智能情报站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Outfit', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              accent: '#00f2ff',
              cyan: { 400: '#22d3ee', 500: '#06b6d4' },
              purple: { 400: '#c084fc', 600: '#9333ea' },
              slate: { 900: '#020617', 950: '#010409' }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #010409;
            --accent-cyan: #00f2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #e2e8f0;
            overflow-x: hidden;
            background: radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
        }

        .heading-font { font-family: 'Outfit', sans-serif; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .scanline {
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--accent-cyan), transparent);
            opacity: 0.1;
            position: fixed;
            animation: scan 8s linear infinite;
            z-index: 50;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .data-card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .data-card:hover {
            transform: translateY(-4px) scale(1.01);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 242, 255, 0.3);
        }

        .gauge-container {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
        }
        .gauge-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.15); border-radius: 10px; }
        
        @media (max-width: 640px) {
            .mobile-stack { flex-direction: column; }
        }
    </style>
</head>
<body class="min-h-screen selection:bg-cyan-500/30">
    <div class="scanline"></div>

    <!-- HUD 头部 -->
    <header class="sticky top-0 z-40 border-b border-white/5 bg-slate-950/50 backdrop-blur-xl px-4 md:px-8 py-4">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20 ring-1 ring-white/10">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white uppercase italic heading-font">AI <span class="text-cyan-400">RADAR</span></h1>
                    <div class="flex items-center gap-2 text-[9px] md:text-[10px] mono-font text-white/40 uppercase tracking-[0.25em]">
                        <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,211,238,0.8)]"></span>
                        Signal Live Tracking
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-4 md:gap-8">
                <div class="text-right hidden sm:block">
                    <div class="text-[9px] text-white/20 uppercase tracking-widest mb-0.5">Uplink Status</div>
                    <div id="last-update-time" class="text-xs md:text-sm font-medium mono-font text-cyan-400/80 italic">CONNECTING...</div>
                </div>
                <button id="toggle-all-mode" class="glass-panel px-3 md:px-5 py-2 rounded-lg text-[10px] md:text-xs font-bold hover:bg-white/10 transition-all border-white/10 uppercase tracking-widest text-white/80">
                    Verbose
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
        
        <!-- 左翼：源健康度监控 (移动端可折叠/后置) -->
        <aside class="lg:col-span-3 space-y-6 order-2 lg:order-1">
            <div class="glass-panel rounded-3xl p-6 relative overflow-hidden">
                <div class="absolute -top-4 -left-4 p-2 text-6xl opacity-[0.03] font-black italic uppercase heading-font pointer-events-none">Nodes</div>
                <h3 class="text-xs font-bold text-white/50 mb-6 flex items-center gap-2 tracking-widest uppercase heading-font">
                    <svg class="w-4 h-4 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    Network Coverage
                </h3>
                <div id="source-coverage-list" class="space-y-4 max-h-[400px] lg:max-h-[700px] overflow-y-auto pr-2 custom-scroll">
                    <div class="animate-pulse flex flex-col gap-4">
                        <div class="h-16 bg-white/5 rounded-2xl"></div>
                        <div class="h-16 bg-white/5 rounded-2xl"></div>
                        <div class="h-16 bg-white/5 rounded-2xl"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 中核：情报流 -->
        <section class="lg:col-span-6 space-y-4 min-h-[500px] order-1 lg:order-2">
            <div id="news-container" class="space-y-4">
                <div class="glass-panel rounded-3xl p-24 text-center">
                    <div class="inline-block animate-spin rounded-full h-10 w-10 border-[3px] border-white/5 border-t-cyan-400 mb-6"></div>
                    <div class="text-white/20 uppercase tracking-[0.4em] text-[10px] mono-font">Syncing Quantum Signal...</div>
                </div>
            </div>
        </section>

        <!-- 右翼：仪表盘指标 -->
        <aside class="lg:col-span-3 space-y-6 order-3">
            <!-- 圆形仪表盘区域 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-6">
                <!-- 仪表盘 1: 信号捕获 -->
                <div class="glass-panel rounded-3xl p-6 flex flex-col items-center text-center relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] mb-4 font-bold heading-font">24H Captured</div>
                    <div class="w-32 h-32 md:w-40 md:h-40 relative">
                        <canvas id="gauge-capture" class="w-full h-full"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <span id="stat-total-count" class="text-2xl md:text-3xl font-black text-white heading-font">0</span>
                            <span class="text-[9px] text-white/40 uppercase mono-font">Signals</span>
                        </div>
                    </div>
                </div>

                <!-- 仪表盘 2: 源健康度 -->
                <div class="glass-panel rounded-3xl p-6 flex flex-col items-center text-center relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-purple-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] mb-4 font-bold heading-font">Node Health</div>
                    <div class="w-32 h-32 md:w-40 md:h-40 relative">
                        <canvas id="gauge-health" class="w-full h-full"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <span id="stat-health-percent" class="text-2xl md:text-3xl font-black text-white heading-font">0%</span>
                            <span id="stat-source-count-node" class="text-[9px] text-white/40 uppercase mono-font">0 Nodes</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 里程碑日志 -->
            <div class="glass-panel rounded-3xl p-6 relative overflow-hidden">
                <div class="absolute -bottom-6 -right-6 w-32 h-32 bg-cyan-500/5 blur-3xl rounded-full"></div>
                <h3 class="text-xs font-bold text-white/50 mb-6 flex items-center gap-2 tracking-widest uppercase heading-font">
                    <svg class="w-4 h-4 text-cyan-400" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1a1 1 0 112 0v1a1 1 0 11-2 0zM13.464 15.657a1 1 0 010-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1z"/></svg>
                    AIGC Milestones
                </h3>
                <div id="waytoagi-list" class="space-y-4">
                    <div class="animate-pulse space-y-3">
                        <div class="h-3 bg-white/5 rounded-full w-3/4"></div>
                        <div class="h-3 bg-white/5 rounded-full w-1/2"></div>
                    </div>
                </div>
            </div>
            
            <footer class="px-6 py-2 text-[9px] text-white/15 mono-font leading-relaxed uppercase tracking-[0.2em]">
                System Release v2.5-RADAR<br>
                Sub-Surface Data Extraction<br>
                © 2026 INTELLIGENCE COMMAND
            </footer>
        </aside>
    </main>

    <!-- 底部状态条 (Mobile) -->
    <div class="fixed bottom-0 left-0 w-full glass-panel border-t border-white/5 p-3 flex justify-around sm:hidden z-50 backdrop-blur-2xl">
        <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span>
            <span class="text-white/60 text-[9px] font-bold tracking-widest uppercase">Live</span>
        </div>
        <span id="stat-mobile" class="text-cyan-400/80 text-[9px] font-bold tracking-widest uppercase mono-font">SCANNING...</span>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
