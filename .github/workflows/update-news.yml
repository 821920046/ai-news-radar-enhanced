name: Update AI News Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"   # 每 4 小时（UTC 0/4/8/12/16/20点 = 北京时间 8/12/16/20/0/4点）

concurrency:
  group: update-ai-news-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Prepare OPML (optional)
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
            echo "Loaded feeds/follow.opml from FOLLOW_OPML_B64 secret"
          else
            echo "No FOLLOW_OPML_B64 secret provided; RSS OPML is optional"
          fi

      - name: Update data
        run: |
          if [ -f feeds/follow.opml ]; then
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 3 --rss-opml feeds/follow.opml
          else
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 3
          fi

      - name: Validate output
        run: |
          python -c "
          import json, sys
          d = json.load(open('data/latest-24h.json', encoding='utf-8'))
          n = d.get('total_items', 0)
          print(f'AI items: {n}')
          if n < 3:
              print('ERROR: Too few items, possible source failure')
              sys.exit(1)
          print('Data quality check passed')
          "

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-24h.json data/latest-24h-all.json data/archive.json data/source-status.json data/waytoagi-7d.json data/title-zh-cache.json
          git commit -m "chore: update ai news snapshot"
          git push

      # Uncomment and configure to receive failure notifications
      # - name: Notify on failure
      #   if: failure()
      #   run: |
      #     curl -X POST "${{ secrets.WEBHOOK_URL }}" \
      #       -H "Content-Type: application/json" \
      #       -d '{"text": "AI News Radar update failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
